apiVersion: v1
kind: ConfigMap
metadata:
  name: attack-app-otel-env
  namespace: boutique
data:
  OTEL_SERVICE_NAME: attack-app
  # Point at the traceenrich DaemonSet collector service.
  # The Operator creates this service in opentelemetry-operator-system;
  # change the namespace suffix if your Operator is in a different namespace.
  OTEL_EXPORTER_OTLP_ENDPOINT: http://traceenrich-collector.opentelemetry-operator-system.svc.cluster.local:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  # Short batch delay so spans reach the collector cache before Tetragon logs do.
  # Default is 5000 ms which would cause consistent cache misses on short-lived spans.
  OTEL_BSP_SCHEDULE_DELAY: "100"
  OTEL_BSP_MAX_EXPORT_BATCH_SIZE: "64"
