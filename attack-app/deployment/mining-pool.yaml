apiVersion: apps/v1
kind: Deployment
metadata:
  name: mining-pool
  namespace: boutique
  labels:
    app: mining-pool
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mining-pool
  template:
    metadata:
      labels:
        app: mining-pool
    spec:
      nodeSelector:
        agentpool: lab
      tolerations:
        - key: lab
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: pool
          image: busybox:1.36
          command: ["/bin/sh", "-c", "while true; do nc -l -p 3333; done"]
          ports:
            - containerPort: 3333
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mining-pool-svc
  namespace: boutique
spec:
  selector:
    app: mining-pool
  ports:
    - port: 3333
      targetPort: 3333
