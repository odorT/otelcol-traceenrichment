apiVersion: apps/v1
kind: Deployment
metadata:
  name: attack-app
  namespace: boutique
  labels:
    app: attack-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: attack-app
  template:
    metadata:
      labels:
        app: attack-app
    spec:
      nodeSelector:
        agentpool: lab
      tolerations:
        - key: lab
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: attack-app
          image: docker.io/odort/attack-app:0.1.0
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: attack-app-otel-env
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: attack-app
  namespace: boutique
spec:
  selector:
    app: attack-app
  ports:
    - port: 3000
      targetPort: 3000
