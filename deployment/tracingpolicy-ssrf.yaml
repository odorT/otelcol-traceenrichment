apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: detect-ssrf
spec:
  kprobes:
    - call: "tcp_connect"
      syscall: false
      args:
        - index: 0
          type: "sock"
      selectors:
        - matchArgs:
            - index: 0
              operator: "DAddr"
              values:
                - "169.254.169.254/32"
